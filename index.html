<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 【關鍵修復】加入 viewport-fit=cover 與縮放限制，徹底消除系統頂部的強制遮蔽/瀏海黑邊 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D 模型互動檢視器</title>
    <!-- 引入 Tailwind CSS 美化 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Three.js 核心與相關載入器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <!-- 新增 FBX 載入器及其解壓縮依賴庫 fflate -->
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <!-- 【新增】引入 CSS2DRenderer，用於渲染跟隨 3D 座標的 HTML 註解標籤 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <style>
        /* 【關鍵修復】將 height 改為 100%，避免 100vh 在行動裝置上因網址列造成的計算誤差與頂部黑塊 */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #1a1a1a; }
        /* 調整排版為上下分割，完美適應手機螢幕 */
        body { display: flex; flex-direction: column; }
        #canvas-container { flex: 1; position: relative; width: 100%; overflow: hidden; touch-action: none; }
        #ui-panel { flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        canvas { display: block; outline: none; }
        #loading { display: none; }
        
        /* 新增隱藏捲軸樣式，讓橫向滑動更美觀 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- Three.js 畫布容器 (上方：3D 模型專屬顯示區) -->
    <div id="canvas-container">
        <!-- 載入中提示改為顯示在上方畫布中央 -->
        <div id="loading" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-600 text-white px-6 py-3 rounded-xl shadow-2xl font-bold animate-pulse z-50">
            模型載入中...
        </div>
    </div>

    <!-- 用戶介面層 (下方：極致扁平化控制視窗) -->
    <div id="ui-panel" class="bg-gray-900 border-t border-gray-800 p-2 pb-[calc(0.5rem+env(safe-area-inset-bottom))] shadow-2xl w-full z-10 flex flex-col">
        
        <!-- 第一排：檔案匯入與功能開關 (可橫向滑動) -->
        <div class="flex items-center gap-3 overflow-x-auto hide-scrollbar w-full px-1">
            <label class="flex-shrink-0 cursor-pointer bg-blue-600 hover:bg-blue-500 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                匯入模型
                <!-- 【iOS 終極解法】完全移除 accept 屬性，強制讓 iPhone 允許點選任何檔案 -->
                <input type="file" id="fileInput" class="hidden" />
            </label>

            <!-- 【新增】註解模式開關按鈕 -->
            <button id="annotateToggle" class="flex-shrink-0 bg-gray-700 hover:bg-gray-600 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow border border-gray-600">
                📌 新增註解
            </button>

            <!-- 【新增】匯出與匯入註解紀錄按鈕 -->
            <button id="exportBtn" class="flex-shrink-0 bg-emerald-700 hover:bg-emerald-600 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow border border-emerald-600">
                💾 匯出紀錄
            </button>
            <label class="flex-shrink-0 cursor-pointer bg-emerald-700 hover:bg-emerald-600 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow flex items-center border border-emerald-600">
                📂 匯入紀錄
                <!-- 【iOS 終極解法】完全移除 accept 屬性，強制讓 iPhone 允許點選任何檔案 -->
                <input type="file" id="importBtn" class="hidden" />
            </label>

            <!-- 開關區縮小並與匯入按鈕並排 -->
            <div class="flex gap-4 text-gray-300 text-[12px] flex-shrink-0 items-center border-l border-gray-700 pl-3">
                <!-- 【新增】平行投影切換開關 -->
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="cameraToggle" class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 📐 平行投影</label>
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="edgeToggle" checked class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 🔲 輪廓線</label>
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="xrayToggle" class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 👁️ X-Ray透視</label>
            </div>
        </div>

        <!-- 第二排：視角按鈕 (預設隱藏，橫向滑動) -->
        <div id="view-buttons" class="mt-2 flex gap-1.5 hidden w-full overflow-x-auto hide-scrollbar px-1">
            <button onclick="setView('top')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">俯視</button>
            <button onclick="setView('front')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">正視</button>
            <button onclick="setView('bottom')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">底視</button>
            <button onclick="setView('left')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">左側</button>
            <button onclick="setView('back')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">後視</button>
            <button onclick="setView('right')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">右側</button>
        </div>

        <!-- 第三排：操作提示 -->
        <div class="mt-1.5 text-center text-[11px] text-gray-500">
            👆 單指：旋轉視角 &nbsp;|&nbsp; ✌️ 雙指捏合：縮放 &nbsp;|&nbsp; ✌️ 雙指滑動：平移
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');

        // 1. 初始化場景、攝影機與渲染器
        const scene = new THREE.Scene();
        // 加入柔和的背景色
        scene.background = new THREE.Color(0x2a2a2a); 

        // 【升級】雙攝影機架構 (透視圖 與 平行投影)
        let cameraPersp, cameraOrtho, camera;
        let frustumSize = 15; // 平行投影的視椎體基礎大小

        const aspect = container.clientWidth / container.clientHeight;
        
        // 透視攝影機 (符合人眼近大遠小的視覺)
        cameraPersp = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
        cameraPersp.position.set(0, 5, 10);

        // 平行投影攝影機 (無透視變形，適合工程視圖)
        cameraOrtho = new THREE.OrthographicCamera(
            -frustumSize * aspect / 2, frustumSize * aspect / 2,
            frustumSize / 2, -frustumSize / 2,
            0.1, 1000
        );
        cameraOrtho.position.set(0, 5, 10);

        // 預設啟用透視攝影機
        camera = cameraPersp;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 優化手機螢幕的高解析畫質
        // 設定物理光照衰減
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // 【新增】初始化 CSS2DRenderer，用於渲染 HTML 標籤
        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(container.clientWidth, container.clientHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px'; // 【關鍵修復】確保 2D 圖層緊貼左側無偏移
        labelRenderer.domElement.style.pointerEvents = 'none'; // 預設讓點擊穿透，由標籤自身捕捉點擊
        container.appendChild(labelRenderer.domElement);

        // 【新增】方位指標 (HUD) 專屬場景與攝影機設定
        const sceneHUD = new THREE.Scene();
        // 為了確保指示器不變形，使用正交攝影機
        const cameraHUD = new THREE.OrthographicCamera(-3, 3, 3, -3, 0.1, 100);
        cameraHUD.position.set(0, 0, 5);

        // 【升級】移除單向 AxesHelper，建立雙向 3D 座標軸線條
        const matX = new THREE.LineBasicMaterial({ color: 0xff4444 });
        const matY = new THREE.LineBasicMaterial({ color: 0x44ff44 });
        const matZ = new THREE.LineBasicMaterial({ color: 0x44aaff });
        
        const geoX = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-2, 0, 0), new THREE.Vector3(2, 0, 0)]);
        const geoY = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -2, 0), new THREE.Vector3(0, 2, 0)]);
        const geoZ = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, -2), new THREE.Vector3(0, 0, 2)]);
        
        sceneHUD.add(new THREE.Line(geoX, matX));
        sceneHUD.add(new THREE.Line(geoY, matY));
        sceneHUD.add(new THREE.Line(geoZ, matZ));

        // 建立精緻的文字標籤函數 (支援中文字體)
        function makeTextSprite(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const context = canvas.getContext('2d');
            // 設定支援中文的粗體字型
            context.font = 'Bold 36px "Microsoft JhengHei", "PingFang TC", sans-serif';
            context.fillStyle = color;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            // 將文字畫在正中央
            context.fillText(text, 32, 32);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(1.5, 1.5, 1);
            return sprite;
        }
        
        // 【升級】加入六個方位的中文標籤
        // X 軸 (紅)
        const spriteE = makeTextSprite('東', '#ff4444'); spriteE.position.set(2.6, 0, 0); sceneHUD.add(spriteE);
        const spriteW = makeTextSprite('西', '#ff4444'); spriteW.position.set(-2.6, 0, 0); sceneHUD.add(spriteW);
        // Y 軸 (綠)
        const spriteT = makeTextSprite('正', '#44ff44'); spriteT.position.set(0, 2.6, 0); sceneHUD.add(spriteT);
        const spriteB = makeTextSprite('反', '#44ff44'); spriteB.position.set(0, -2.6, 0); sceneHUD.add(spriteB);
        // Z 軸 (藍)
        const spriteS = makeTextSprite('南', '#44aaff'); spriteS.position.set(0, 0, 2.6); sceneHUD.add(spriteS);
        const spriteN = makeTextSprite('北', '#44aaff'); spriteN.position.set(0, 0, -2.6); sceneHUD.add(spriteN);

        // 2. 加入燈光以顯示模型細節
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // 環境光
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // 平行光（模擬太陽光）
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);
        
        const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4); // 背面補光
        directionalLight2.position.set(-10, -10, -10);
        scene.add(directionalLight2);

        // 3. 加入軌跡球控制器 (OrbitControls) 允許任意翻轉放大
        // 【關鍵修復】將控制器重新綁定回底層的 WebGL 畫布 (renderer.domElement)，恢復旋轉與縮放功能
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 啟用阻尼（慣性），讓旋轉更滑順
        controls.dampingFactor = 0.05;

        // 建立一個變數來儲存當前的模型，以便載入新模型時可以移除舊的
        let currentModel = null;
        let optimalCameraDistance = 15; // 新增：儲存最佳觀看距離供視角切換使用
        
        // 【新增】註解系統相關變數
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isAnnotationMode = false;
        let annotationsList = []; // 儲存 Three.js 的 3D 物件標記，用於畫面清理
        let annotationsDataList = []; // 【新增】純資料陣列，用於儲存與匯出 (包含位置、文字、圖片Base64)
        
        // 【終極進化】儲存原始模型二進位資料，用於打包匯出
        let currentModelArrayBuffer = null;
        let currentModelExt = '';

        // 【新增】將清理畫面的邏輯獨立成一個模組函數，方便重複使用
        function clearCurrentScene() {
            if (currentModel) {
                scene.remove(currentModel);
                currentModel.traverse(function(child) {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach(mat => {
                            for (const key in mat) { if (mat[key] && mat[key].isTexture) mat[key].dispose(); }
                            mat.dispose();
                        });
                    }
                });
                currentModel = null;
            }
            annotationsList.forEach(obj => {
                scene.remove(obj);
                if(obj.element) obj.element.remove();
            });
            annotationsDataList.forEach(data => {
                if(data.cardElement) data.cardElement.remove(); // 清除獨立視窗
            });
            annotationsList = [];
            annotationsDataList = []; // 模型更換時同步清空資料紀錄
        }

        // 4. 處理檔案上傳邏輯
        const fileInput = document.getElementById('fileInput');
        const loadingIndicator = document.getElementById('loading');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 顯示載入中提示
            loadingIndicator.style.display = 'block';

            const filename = file.name.toLowerCase();
            const extension = filename.split('.').pop();
            const objectUrl = URL.createObjectURL(file);

            // 【關鍵修復 1：重置狀態】清空 input 的值。這樣即使您連續匯入「同一個檔名」的檔案，也能100%觸發載入動作！
            event.target.value = '';

            // 清理舊畫面
            clearCurrentScene();

            // 【新增】讀取並儲存原始檔案的二進位資料，供未來打包匯出使用
            currentModelExt = extension;
            const bufferReader = new FileReader();
            bufferReader.onload = (e) => { currentModelArrayBuffer = e.target.result; };
            bufferReader.readAsArrayBuffer(file);

            // 呼叫獨立的模型載入函數
            executeModelLoad(objectUrl, extension);
        });

        // 【新增】將載入邏輯獨立，以便支援專案檔(.3dproj)的自動還原
        function executeModelLoad(objectUrl, extension, pendingAnnotations = null) {
            // 依據副檔名選擇對應的載入器
            if (extension === 'glb' || extension === 'gltf') {
                const loader = new THREE.GLTFLoader();
                loader.load(objectUrl, function(gltf) {
                    processLoadedModel(gltf.scene, pendingAnnotations);
                    URL.revokeObjectURL(objectUrl); // 載入完成後立即釋放暫存檔案記憶體
                }, undefined, function(error) {
                    console.error('GLTF 載入錯誤:', error);
                    alert('載入模型時發生錯誤。');
                    loadingIndicator.style.display = 'none';
                    URL.revokeObjectURL(objectUrl);
                });
            } else if (extension === 'fbx') {
                // 【新增 FBX 處理邏輯】
                const loader = new THREE.FBXLoader();
                loader.load(objectUrl, function(object) {
                    processLoadedModel(object);
                    URL.revokeObjectURL(objectUrl);
                }, undefined, function(error) {
                    console.error('FBX 載入錯誤:', error);
                    alert('載入模型時發生錯誤。');
                    loadingIndicator.style.display = 'none';
                    URL.revokeObjectURL(objectUrl);
                });
            } else if (extension === 'stl') {
                const loader = new THREE.STLLoader();
                loader.load(objectUrl, function(geometry) {
                    // STL 只有幾何體，確保計算表面法線以正確受光
                    geometry.computeVertexNormals();
                    
                    // 【材質修改】為不含材質的 STL 檔案賦予無反光的霧面預設材質
                    const material = new THREE.MeshStandardMaterial({ 
                        color: 0x4aa5ff, // 高質感的科技藍色
                        roughness: 1.0,  // 完全粗糙，呈現純霧面效果
                        metalness: 0.0,  // 無金屬感，徹底消除高光反射
                        side: THREE.DoubleSide // 內外雙面渲染
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    
                    processLoadedModel(mesh);
                    URL.revokeObjectURL(objectUrl);
                }, undefined, function(error) {
                    console.error('STL 載入錯誤:', error);
                    alert('載入模型時發生錯誤。');
                    loadingIndicator.style.display = 'none';
                    URL.revokeObjectURL(objectUrl);
                });
            } else {
                alert('不支援的檔案格式，請匯入 .glb, .gltf, .stl 或 .fbx 檔案。');
                loadingIndicator.style.display = 'none';
                URL.revokeObjectURL(objectUrl);
            }
        }

        // 5. 處理載入後的模型（自動置中與縮放）
        function processLoadedModel(object, pendingAnnotations = null) {
            currentModel = object;
            
            // 【新增邊界渲染】為模型中的每個鋼板/實體加上邊界黑線，方便查看搭接處
            const edgeToggle = document.getElementById('edgeToggle');
            const showEdges = edgeToggle ? edgeToggle.checked : true;
            
            // 【新增】取得目前的 X-Ray 狀態
            const xrayToggle = document.getElementById('xrayToggle');
            const isXray = xrayToggle ? xrayToggle.checked : false;
            
            currentModel.traverse(function(child) {
                if (child.isMesh) {
                    // 【深度排序優化】確保輪廓線不會被平貼的面遮擋 (解決閃爍與隱藏問題)
                    if (child.material) {
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach(mat => {
                            // 儲存原始透明度設定，方便切換還原
                            mat.userData.originalTransparent = mat.transparent;
                            mat.userData.originalOpacity = mat.opacity;
                            
                            // 啟用多邊形偏移，把「光滑面」在視覺上往後退一點，讓「黑線」完全凸顯
                            mat.polygonOffset = true;
                            mat.polygonOffsetFactor = 1;
                            mat.polygonOffsetUnits = 1;

                            // 如果一載入就開啟了 X-Ray
                            if (isXray) {
                                mat.transparent = true;
                                mat.opacity = 0.4;
                                mat.depthWrite = false; // 讓內部結構不再互相遮擋
                            }
                        });
                    }

                    // 使用 EdgesGeometry 提取邊緣。15 代表只要相鄰面夾角大於 15 度就會畫線
                    const edges = new THREE.EdgesGeometry(child.geometry, 15);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
                        color: 0x000000, // 黑色線條
                        linewidth: 1 
                    }));
                    line.name = 'model_edges';
                    line.visible = showEdges; // 根據開關狀態決定是否顯示
                    child.add(line);
                }
            });

            scene.add(currentModel);

            // 計算模型的邊界框 (Bounding Box)
            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);

            // 【防呆機制】防止載入空檔案或異常模型導致畫面崩潰
            if (maxDim === 0 || !isFinite(maxDim)) {
                alert('模型尺寸異常或無實體數據，無法顯示。');
                loadingIndicator.style.display = 'none';
                scene.remove(currentModel);
                currentModel = null;
                return;
            }

            // 【關鍵升級】將模型等比例縮放至合理大小，避免因尺寸過大超出攝影機範圍
            const targetSize = 10;
            const scale = targetSize / (maxDim || 1);
            currentModel.scale.set(scale, scale, scale);

            // 重新計算縮放後的邊界與中心
            const scaledBox = new THREE.Box3().setFromObject(currentModel);
            const center = scaledBox.getCenter(new THREE.Vector3());

            // 將模型移至場景中心
            currentModel.position.x -= center.x;
            currentModel.position.y -= center.y;
            currentModel.position.z -= center.z;

            // 根據新大小自動調整攝影機距離
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(targetSize / 2 / Math.tan(fov / 2));
            cameraZ *= 1.5; // 加上一點緩衝空間
            optimalCameraDistance = cameraZ; // 儲存此距離
            
            // 【修復】放大平行投影的視椎體空間 (從 1.5 倍提升至 2.5 倍)，徹底消除旋轉時頂部被「隱形天花板」裁切的現象
            frustumSize = targetSize * 2.5;
            const currentAspect = container.clientWidth / container.clientHeight;

            // 【修復】將攝影機初始高度 (Y軸) 歸零，讓模型完美置中，消除上方的多餘空白
            cameraPersp.far = cameraZ * 10;
            cameraPersp.position.set(0, 0, cameraZ);
            cameraPersp.updateProjectionMatrix();

            // 同步更新平行投影攝影機
            cameraOrtho.far = cameraZ * 10;
            cameraOrtho.left = -frustumSize * currentAspect / 2;
            cameraOrtho.right = frustumSize * currentAspect / 2;
            cameraOrtho.top = frustumSize / 2;
            cameraOrtho.bottom = -frustumSize / 2;
            cameraOrtho.position.set(0, 0, cameraZ);
            cameraOrtho.updateProjectionMatrix();

            // 更新當前啟用的攝影機與控制器目標
            camera.position.set(0, 0, cameraZ);
            controls.target.set(0, 0, 0);
            controls.update();

            // 隱藏載入中提示
            loadingIndicator.style.display = 'none';
            
            // 顯示視角切換按鈕
            document.getElementById('view-buttons').classList.remove('hidden');

            // 【終極進化】如果有待還原的註解資料，在模型載入完畢、位置確立後立刻生成！
            if (pendingAnnotations) {
                pendingAnnotations.forEach(data => {
                    const pos = new THREE.Vector3(data.position.x, data.position.y, data.position.z);
                    createAnnotation(pos, data);
                });
                alert(`成功載入專案檔！包含模型與 ${pendingAnnotations.length} 筆註解。`);
            }
        }

        // 【新增】實作光線投射與註解建立邏輯
        const annotateToggleBtn = document.getElementById('annotateToggle');
        annotateToggleBtn.addEventListener('click', () => {
            isAnnotationMode = !isAnnotationMode;
            if (isAnnotationMode) {
                annotateToggleBtn.classList.replace('bg-gray-700', 'bg-red-600');
                annotateToggleBtn.classList.replace('hover:bg-gray-600', 'hover:bg-red-500');
                annotateToggleBtn.innerHTML = '🔴 取消標記';
                // 開啟 CSS2DRenderer 容器的點擊事件捕捉，以便進行光線投射
                labelRenderer.domElement.style.pointerEvents = 'auto';
                container.style.cursor = 'crosshair';
            } else {
                annotateToggleBtn.classList.replace('bg-red-600', 'bg-gray-700');
                annotateToggleBtn.classList.replace('hover:bg-red-500', 'hover:bg-gray-600');
                annotateToggleBtn.innerHTML = '📌 新增註解';
                labelRenderer.domElement.style.pointerEvents = 'none';
                container.style.cursor = 'default';
            }
        });

        // 監聽畫布點擊，射出光線尋找點擊的 3D 座標
        labelRenderer.domElement.addEventListener('pointerdown', (event) => {
            if (!isAnnotationMode || !currentModel) return;

            // 【終極修復 1：無死角座標換算】使用目標元素的絕對寬高，消除任何因螢幕比例或外層容器造成的計算誤差
            const rect = labelRenderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            // 偵測與模型的交點
            const intersects = raycaster.intersectObject(currentModel, true);

            // 【終極修復 2：強制過濾干擾物】嚴格限制雷射只能打在「實體網格(isMesh)」上，並且強制過濾掉我們畫的「黑色邊緣線(model_edges)」！
            const validIntersects = intersects.filter(hit => hit.object.isMesh && hit.object.visible && hit.object.name !== 'model_edges');

            if (validIntersects.length > 0) {
                // 在第一個「真實且有效的實體表面」交點處產生註解卡片
                createAnnotation(validIntersects[0].point);
                
                // 標記完成後自動關閉標記模式，恢復一般旋轉模式
                annotateToggleBtn.click();
            }
        });

        // 動態生成 HTML 註解卡片函數 (支援載入已有資料)
        function createAnnotation(position, existingData = null) {
            // 【升級】尋找目前最大的流水號，使用 parseInt 確保即使使用者自訂了英文名稱，自動數字依然能正確遞增
            let currentMax = 0;
            annotationsDataList.forEach(item => {
                const num = parseInt(item.markerNumber, 10);
                if (!isNaN(num) && num > currentMax) {
                    currentMax = num;
                }
            });

            // 資料綁定模型
            const data = existingData || {
                id: Date.now().toString() + Math.random().toString(),
                position: { x: position.x, y: position.y, z: position.z },
                text: '',
                image: '',
                markerNumber: (currentMax + 1).toString() // 給予自動遞增的流水號，轉為字串以利編輯
            };
            
            // 相容舊版無編號的紀錄檔 (自動為舊資料補上流水號)
            if (existingData && !data.markerNumber) {
                data.markerNumber = (currentMax + 1).toString();
                currentMax++; // 確保同批次匯入的舊資料號碼會持續遞增
            }

            // 【底層修復】確保不管是新建還是匯入，資料都會進入目前的狀態庫，保證能夠再次匯出
            if (!annotationsDataList.find(item => item.id === data.id)) {
                annotationsDataList.push(data);
            }

            // ==========================================
            // 元件 1：3D 空間中的標記按鈕 (受 Three.js 座標控制)
            // ==========================================
            const annotationDiv = document.createElement('div');
            annotationDiv.style.width = '28px';
            annotationDiv.style.height = '28px';
            annotationDiv.className = 'relative pointer-events-auto';

            const markerBtn = document.createElement('div');
            markerBtn.style.width = '100%';
            markerBtn.style.height = '100%';
            // 若文字較長(如中文字)，設定 overflow-hidden 避免破壞圓形
            markerBtn.className = 'bg-blue-600 rounded-full border-2 border-white shadow-[0_0_10px_rgba(0,0,0,0.5)] cursor-pointer flex items-center justify-center text-white font-bold text-sm transition-transform hover:scale-110 z-10 overflow-hidden whitespace-nowrap text-ellipsis px-1';
            // 將按鈕文字從 'i' 改為專屬流水編號
            markerBtn.innerText = data.markerNumber;
            annotationDiv.appendChild(markerBtn);

            // 將 HTML 轉換為 Three.js 的 CSS2D 空間物件
            const cssObject = new THREE.CSS2DObject(annotationDiv);
            cssObject.position.set(data.position.x, data.position.y, data.position.z);
            scene.add(cssObject);
            annotationsList.push(cssObject);


            // ==========================================
            // 元件 2：獨立於 3D 空間的全螢幕大視窗 (直接掛載於 document.body)
            // ==========================================
            const cardDiv = document.createElement('div');
            // 【終極進化】放棄 Tailwind 動態類別，改用原生 style 屬性確保尺寸與層級 100% 生效！
            cardDiv.className = 'hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gray-50 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-5 flex flex-col gap-3 border border-gray-200 overflow-y-auto';
            
            // 【極致自適應升級】解放寬度與高度，打造真正的超大編輯視窗！
            cardDiv.style.width = '95vw';
            cardDiv.style.maxWidth = '1200px'; // 讓大螢幕也能完美展開，不再侷限於 600px
            cardDiv.style.height = '85vh'; // 強制展開高度，不再因為內容少而萎縮
            cardDiv.style.maxHeight = '90vh';
            cardDiv.style.zIndex = '1000'; // 確保在最上層
            
            cardDiv.innerHTML = `
                <div class="flex justify-between items-center border-b border-gray-200 pb-2 flex-shrink-0">
                    <div class="flex items-center gap-2 font-bold text-gray-800 text-lg">
                        📝 標記
                        <!-- 【升級】將靜態標題轉換為可編輯的輸入框 -->
                        <input type="text" class="marker-name-input w-20 bg-gray-200 hover:bg-gray-300 border border-transparent focus:border-blue-500 rounded px-2 py-0.5 text-center focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors cursor-text text-blue-700" value="${data.markerNumber}" title="點擊自訂標記名稱/編號" />
                    </div>
                    <button class="close-btn text-gray-400 hover:text-red-500 font-bold text-3xl leading-none p-1">✕</button>
                </div>
                <input type="file" accept="image/*" class="img-upload flex-shrink-0 text-sm text-gray-600 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 w-full cursor-pointer ${data.image ? 'hidden' : ''}"/>
                
                <!-- 【極致自適應升級】圖片預覽高度改為 40vh，不再寫死 16rem，讓圖片能根據螢幕高度自適應變大 -->
                <img class="preview-img ${data.image ? '' : 'hidden'} object-contain shadow-sm flex-shrink-0 transition-all duration-300" style="width: 100%; height: 40vh; background-color: #f3f4f6; cursor: zoom-in; border-radius: 0.5rem; border: 1px solid #e5e7eb;" src="${data.image}" title="點擊放大/縮小" />
                
                <textarea class="w-full flex-1 p-3 text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 bg-white leading-relaxed" placeholder="請輸入備註...">${data.text}</textarea>
                <button class="delete-btn flex-shrink-0 w-full bg-red-50 text-red-600 hover:bg-red-100 py-3 rounded-lg text-sm font-bold transition mt-2 border border-red-100">🗑️ 刪除此標記</button>
            `;

            // 【關鍵綁定】將獨立視窗掛載到最外層的 body，徹底脫鉤！
            document.body.appendChild(cardDiv);
            data.cardElement = cardDiv; // 記錄在資料中以便未來清理

            // --- 互動事件綁定 ---
            // 點擊 3D 空間的圓鈕：在螢幕中央展開獨立視窗
            markerBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                cardDiv.classList.remove('hidden');
            });

            // 【終極修復】圖片全螢幕放大/縮小邏輯 (使用原生 JS 直接操控 CSS，繞過 CDN 編譯限制)
            const previewImg = cardDiv.querySelector('.preview-img');
            let isZoomed = false;
            previewImg.addEventListener('click', (e) => {
                e.stopPropagation();
                isZoomed = !isZoomed;
                if (isZoomed) {
                    // 強制放大至全螢幕：蓋住所有東西
                    previewImg.style.position = 'fixed';
                    previewImg.style.top = '0';
                    previewImg.style.left = '0';
                    previewImg.style.width = '100vw';
                    previewImg.style.height = '100%'; // 使用 100% 配合 fixed 完美適應所有設備
                    previewImg.style.backgroundColor = 'rgba(0,0,0,0.95)';
                    previewImg.style.zIndex = '9999';
                    
                    // 【關鍵修復】移除所有 padding，把黑邊全部拔掉，讓圖片 100% 榨乾螢幕邊緣！
                    previewImg.style.padding = '0'; 
                    previewImg.style.cursor = 'zoom-out';
                    previewImg.style.borderRadius = '0';
                    previewImg.style.border = 'none';
                } else {
                    // 恢復視窗內原狀大小
                    previewImg.style.position = 'static';
                    previewImg.style.width = '100%';
                    previewImg.style.height = '40vh'; // 對應修改後的自適應高度
                    previewImg.style.backgroundColor = '#f3f4f6';
                    previewImg.style.zIndex = 'auto';
                    previewImg.style.padding = '0';
                    previewImg.style.cursor = 'zoom-in';
                    previewImg.style.borderRadius = '0.5rem';
                    previewImg.style.border = '1px solid #e5e7eb';
                }
            });

            // 點擊 X：關閉獨立視窗並還原圖片大小
            const closeBtn = cardDiv.querySelector('.close-btn');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                cardDiv.classList.add('hidden');
                if (isZoomed) {
                    isZoomed = false;
                    previewImg.style.position = 'static';
                    previewImg.style.width = '100%';
                    previewImg.style.height = '40vh';
                    previewImg.style.backgroundColor = '#f3f4f6';
                    previewImg.style.zIndex = 'auto';
                    previewImg.style.padding = '0';
                    previewImg.style.cursor = 'zoom-in';
                    previewImg.style.borderRadius = '0.5rem';
                    previewImg.style.border = '1px solid #e5e7eb';
                }
            });

            // 【新增】監聽標記名稱/編號的修改，即時更新 3D 空間中的按鈕文字
            const markerNameInput = cardDiv.querySelector('.marker-name-input');
            markerNameInput.addEventListener('input', (e) => {
                const newVal = e.target.value.trim();
                data.markerNumber = newVal; // 更新資料模型以供匯出
                // 若清空則顯示驚嘆號防呆，否則即時變更藍色圓鈕文字
                markerBtn.innerText = newVal !== '' ? newVal : '!'; 
            });

            // 文字變更時，即時寫入資料模型
            const textarea = cardDiv.querySelector('textarea');
            textarea.addEventListener('input', (e) => {
                data.text = e.target.value;
            });

            // 刪除邏輯：除了清除 3D 物件，也要把掛載在 body 的大視窗拔除
            const deleteBtn = cardDiv.querySelector('.delete-btn');
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                scene.remove(cssObject); // 移除 3D 標籤
                annotationDiv.remove();
                cardDiv.remove(); // 移除 2D 獨立視窗
                annotationsList = annotationsList.filter(item => item !== cssObject);
                annotationsDataList = annotationsDataList.filter(item => item.id !== data.id);
            });

            // 圖片上傳預覽邏輯
            const imgUpload = cardDiv.querySelector('.img-upload');
            imgUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        const base64Data = re.target.result;
                        previewImg.src = base64Data;
                        previewImg.classList.remove('hidden');
                        imgUpload.classList.add('hidden');
                        data.image = base64Data;
                    };
                    reader.readAsDataURL(file); 
                }
            });

            // 防止在卡片上滑動時觸發背後 3D 攝影機的旋轉
            cardDiv.addEventListener('pointerdown', (e) => e.stopPropagation());
            annotationDiv.addEventListener('pointerdown', (e) => e.stopPropagation());
        }

        // 【終極進化】實作匯出紀錄邏輯 (將 模型 + 註解資料 打包成標準 .zip 專案檔)
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (!currentModelArrayBuffer) {
                alert('請先匯入模型後再進行匯出！');
                return;
            }
            
            // 使用內建的 fflate 庫，將模型二進位檔與註解 JSON 壓縮成一個 ZIP 檔
            const annotationsStr = JSON.stringify(annotationsDataList);
            const zippedData = fflate.zipSync({
                [`model.${currentModelExt}`]: new Uint8Array(currentModelArrayBuffer),
                "annotations.json": fflate.strToU8(annotationsStr)
            });

            // 【終極 iOS 修復】匯出為標準的 .zip 副檔名，確保 iPhone 原生檔案總管能夠識別且允許點選
            const blob = new Blob([zippedData], { type: "application/zip" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'project_record.zip';
            a.click();
            URL.revokeObjectURL(url);
        });

        // 【終極進化】實作匯入紀錄邏輯 (支援自動解壓並還原 模型與註解)
        document.getElementById('importBtn').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            event.target.value = ''; // 重置狀態

            const filename = file.name.toLowerCase();
            const isProjectFile = filename.endsWith('.3dproj') || filename.endsWith('.zip');

            const reader = new FileReader();
            reader.onload = function(e) {
                if (isProjectFile) {
                    try {
                        // 解壓縮 .3dproj 檔案
                        const unzipped = fflate.unzipSync(new Uint8Array(e.target.result));
                        let modelExt = '';
                        let modelData = null;
                        let annotationsData = null;

                        // 從壓縮包內抽出模型與註解資料
                        for (const key in unzipped) {
                            if (key === 'annotations.json') {
                                annotationsData = JSON.parse(fflate.strFromU8(unzipped[key]));
                            } else if (key.startsWith('model.')) {
                                modelExt = key.split('.').pop();
                                modelData = unzipped[key];
                            }
                        }

                        if (modelData && annotationsData) {
                            // 1. 清理舊畫面
                            clearCurrentScene();
                            loadingIndicator.style.display = 'block';
                            
                            // 2. 還原模型快取資料
                            currentModelArrayBuffer = modelData.buffer;
                            currentModelExt = modelExt;

                            // 3. 觸發模型載入，並將註解資料傳入等待還原
                            const blob = new Blob([modelData]);
                            const objUrl = URL.createObjectURL(blob);
                            executeModelLoad(objUrl, modelExt, annotationsData);
                        } else {
                            alert('專案檔格式錯誤，找不到模型或註解資料！');
                        }
                    } catch (err) {
                        alert('解析專案檔失敗！檔案可能已損毀。');
                        console.error(err);
                    }
                } else {
                    // 相容舊版的純 JSON 匯入邏輯
                    if (!currentModel) {
                        alert('純 .json 紀錄檔需要先匯入 3D 模型才能掛載標記！');
                        return;
                    }
                    try {
                        // 使用 TextDecoder 將 ArrayBuffer 轉回字串
                        const jsonStr = new TextDecoder().decode(e.target.result);
                        const importedData = JSON.parse(jsonStr);
                        if (!Array.isArray(importedData)) throw new Error("資料格式錯誤");
                        
                        importedData.forEach(data => {
                            const pos = new THREE.Vector3(data.position.x, data.position.y, data.position.z);
                            createAnnotation(pos, data);
                        });
                        alert(`成功匯入了 ${importedData.length} 筆註解紀錄！`);
                    } catch(err) {
                        alert('匯入失敗：這似乎不是有效的註解紀錄檔 (.json)。');
                        console.error(err);
                    }
                }
            };
            
            // 統一使用 ArrayBuffer 讀取，以支援二進位解壓縮
            reader.readAsArrayBuffer(file);
        });

        // 6. 視窗大小改變時自動適應 (適應手機翻轉或尺寸變化)
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            const aspect = container.clientWidth / container.clientHeight;
            
            // 同步更新兩種攝影機的比例
            cameraPersp.aspect = aspect;
            cameraPersp.updateProjectionMatrix();
            
            cameraOrtho.left = -frustumSize * aspect / 2;
            cameraOrtho.right = frustumSize * aspect / 2;
            cameraOrtho.top = frustumSize / 2;
            cameraOrtho.bottom = -frustumSize / 2;
            cameraOrtho.updateProjectionMatrix();

            renderer.setSize(container.clientWidth, container.clientHeight);
            // 【新增】同步更新 HTML 標籤渲染器的尺寸
            labelRenderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 【新增】監聽攝影機切換開關，實現透視/平行無縫切換
        document.getElementById('cameraToggle').addEventListener('change', function(e) {
            const isOrtho = e.target.checked;
            const prevCamera = camera;
            
            // 切換指標
            camera = isOrtho ? cameraOrtho : cameraPersp;

            // 完美複製前一台攝影機的位置與旋轉角度，確保切換時畫面不跳動
            camera.position.copy(prevCamera.position);
            camera.quaternion.copy(prevCamera.quaternion);

            // 將控制權轉交給新攝影機
            controls.object = camera;
            controls.update();
        });

        // 【新增】監聽輪廓線開關事件，實現即時切換
        document.getElementById('edgeToggle').addEventListener('change', function(e) {
            if (currentModel) {
                currentModel.traverse(function(child) {
                    if (child.name === 'model_edges') {
                        child.visible = e.target.checked;
                    }
                });
            }
        });

        // 【新增】監聽 X-Ray 透視開關事件，實現即時切換
        document.getElementById('xrayToggle').addEventListener('change', function(e) {
            const isXray = e.target.checked;
            if (currentModel) {
                currentModel.traverse(function(child) {
                    if (child.isMesh && child.material) {
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach(mat => {
                            if (isXray) {
                                mat.transparent = true;
                                mat.opacity = 0.4; // 轉為半透明
                                mat.depthWrite = false; // 關閉深度寫入，讓隱藏在實體內部的鋼板穿透線完全顯現
                            } else {
                                // 恢復原本的材質設定
                                mat.transparent = mat.userData.originalTransparent || false;
                                mat.opacity = mat.userData.originalOpacity || 1.0;
                                mat.depthWrite = true;
                            }
                        });
                    }
                });
            }
        });

        // 7. 視角切換邏輯
        function setView(viewName) {
            if (!currentModel) return;
            const d = optimalCameraDistance;
            
            // 依據選擇的視角設定攝影機位置
            switch(viewName) {
                case 'front':  camera.position.set(0, 0, d); break;
                case 'back':   camera.position.set(0, 0, -d); break;
                case 'left':   camera.position.set(-d, 0, 0); break;
                case 'right':  camera.position.set(d, 0, 0); break;
                // 俯視與底視圖在 Z 軸增加極小偏移(0.001)，避免與 Up 向量平行導致畫面異常翻轉
                case 'top':    camera.position.set(0, d, 0.001); break;
                case 'bottom': camera.position.set(0, -d, 0.001); break;
            }
            // 確保目標點維持在模型中心，並更新控制器
            controls.target.set(0, 0, 0);
            controls.update();
        }

        // 8. 動畫迴圈 (持續渲染場景與雙重顯示)
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 必須在 animate 中呼叫才能有阻尼效果
            
            // 【新增】同步 HUD 攝影機視角與主攝影機一致
            const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
            cameraHUD.position.copy(dir.multiplyScalar(5));
            cameraHUD.lookAt(0, 0, 0);
            cameraHUD.up.copy(camera.up);

            // 步驟 A：渲染主場景 (全螢幕)
            renderer.setViewport(0, 0, container.clientWidth, container.clientHeight);
            renderer.setScissorTest(false);
            renderer.render(scene, camera);

            // 【新增】步驟 A-2：渲染 HTML 註解圖層，使其與 3D 空間完美疊合
            labelRenderer.render(scene, camera);

            // 步驟 B：渲染右上角的方位指標 (HUD)
            const hudSize = 100; // 指標大小 (100x100 像素)
            const hudX = container.clientWidth - hudSize - 10; // 距離右邊 10px
            
            // 【微調】加大頂部安全距離，從 10 改為 25，避免指標被手機狀態列或實體瀏海干擾
            const hudY = container.clientHeight - hudSize - 25; 
            
            // 【重要】這裡使用 setScissorTest 控制只清除 HUD 區塊的深度，避免任何干擾
            renderer.setScissorTest(true);
            renderer.setScissor(hudX, hudY, hudSize, hudSize);
            renderer.setViewport(hudX, hudY, hudSize, hudSize);
            
            renderer.autoClear = false; 
            renderer.clearDepth(); // 僅清除深度，確保指標永遠顯示在最上層
            renderer.render(sceneHUD, cameraHUD);
            renderer.autoClear = true; // 恢復預設
        }
        
        // 【修復】啟動前強制校正一次螢幕尺寸，避免初次載入時的長寬比計算誤差
        onWindowResize();
        // 啟動動畫
        animate();
    </script>
</body>
