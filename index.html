<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模型互動檢視器</title>
    <!-- 引入 Tailwind CSS 美化 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Three.js 核心與相關載入器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <!-- 新增 FBX 載入器及其解壓縮依賴庫 fflate -->
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        /* 調整排版為上下分割，完美適應手機螢幕 */
        body { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #canvas-container { flex: 1; position: relative; width: 100%; overflow: hidden; touch-action: none; }
        #ui-panel { flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        canvas { display: block; outline: none; }
        #loading { display: none; }
        
        /* 新增隱藏捲軸樣式，讓橫向滑動更美觀 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- Three.js 畫布容器 (上方：3D 模型專屬顯示區) -->
    <div id="canvas-container">
        <!-- 載入中提示改為顯示在上方畫布中央 -->
        <div id="loading" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-600 text-white px-6 py-3 rounded-xl shadow-2xl font-bold animate-pulse z-50">
            模型載入中...
        </div>
    </div>

    <!-- 用戶介面層 (下方：極致扁平化控制視窗) -->
    <div id="ui-panel" class="bg-gray-900 border-t border-gray-800 p-2 pb-[calc(0.5rem+env(safe-area-inset-bottom))] shadow-2xl w-full z-10 flex flex-col">
        
        <!-- 第一排：檔案匯入與功能開關 (可橫向滑動) -->
        <div class="flex items-center gap-3 overflow-x-auto hide-scrollbar w-full px-1">
            <label class="flex-shrink-0 cursor-pointer bg-blue-600 hover:bg-blue-500 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                匯入模型
                <input type="file" id="fileInput" accept=".glb,.gltf,.stl,.fbx" class="hidden" />
            </label>

            <!-- 開關區縮小並與匯入按鈕並排 -->
            <div class="flex gap-4 text-gray-300 text-[12px] flex-shrink-0 items-center border-l border-gray-700 pl-3">
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="zUpToggle" checked class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 🔄 Z軸校正</label>
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="edgeToggle" checked class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 🔲 輪廓線</label>
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="xrayToggle" class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 👁️ X-Ray透視</label>
            </div>
        </div>

        <!-- 第二排：視角按鈕 (預設隱藏，橫向滑動) -->
        <div id="view-buttons" class="mt-2 flex gap-1.5 hidden w-full overflow-x-auto hide-scrollbar px-1">
            <button onclick="setView('top')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">俯視</button>
            <button onclick="setView('front')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">正視</button>
            <button onclick="setView('bottom')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">底視</button>
            <button onclick="setView('left')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">左側</button>
            <button onclick="setView('back')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">後視</button>
            <button onclick="setView('right')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">右側</button>
        </div>

        <!-- 第三排：操作提示 -->
        <div class="mt-1.5 text-center text-[11px] text-gray-500">
            👆 單指：旋轉視角 &nbsp;|&nbsp; ✌️ 雙指捏合：縮放 &nbsp;|&nbsp; ✌️ 雙指滑動：平移
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');

        // 1. 初始化場景、攝影機與渲染器
        const scene = new THREE.Scene();
        // 加入柔和的背景色
        scene.background = new THREE.Color(0x2a2a2a); 

        // 寬高計算改為相依於上方的顯示區容器
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 優化手機螢幕的高解析畫質
        // 設定物理光照衰減
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // 2. 加入燈光以顯示模型細節
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // 環境光
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // 平行光（模擬太陽光）
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);
        
        const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4); // 背面補光
        directionalLight2.position.set(-10, -10, -10);
        scene.add(directionalLight2);

        // 3. 加入軌跡球控制器 (OrbitControls) 允許任意翻轉放大
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 啟用阻尼（慣性），讓旋轉更滑順
        controls.dampingFactor = 0.05;

        // 建立一個變數來儲存當前的模型，以便載入新模型時可以移除舊的
        let currentModel = null;
        let optimalCameraDistance = 15; // 新增：儲存最佳觀看距離供視角切換使用

        // 4. 處理檔案上傳邏輯
        const fileInput = document.getElementById('fileInput');
        const loadingIndicator = document.getElementById('loading');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 顯示載入中提示
            loadingIndicator.style.display = 'block';

            const filename = file.name.toLowerCase();
            const extension = filename.split('.').pop();
            const objectUrl = URL.createObjectURL(file);

            // 清除前一個模型
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }

            // 依據副檔名選擇對應的載入器
            if (extension === 'glb' || extension === 'gltf') {
                const loader = new THREE.GLTFLoader();
                loader.load(objectUrl, function(gltf) {
                    processLoadedModel(gltf.scene);
                }, undefined, function(error) {
                    console.error('GLTF 載入錯誤:', error);
                    alert('載入模型時發生錯誤。');
                    loadingIndicator.style.display = 'none';
                });
            } else if (extension === 'fbx') {
                // 【新增 FBX 處理邏輯】
                const loader = new THREE.FBXLoader();
                loader.load(objectUrl, function(object) {
                    processLoadedModel(object);
                }, undefined, function(error) {
                    console.error('FBX 載入錯誤:', error);
                    alert('載入模型時發生錯誤。');
                    loadingIndicator.style.display = 'none';
                });
            } else if (extension === 'stl') {
                const loader = new THREE.STLLoader();
                loader.load(objectUrl, function(geometry) {
                    // STL 只有幾何體，確保計算表面法線以正確受光
                    geometry.computeVertexNormals();
                    
                    // 【材質修改】為不含材質的 STL 檔案賦予無反光的霧面預設材質
                    const material = new THREE.MeshStandardMaterial({ 
                        color: 0x4aa5ff, // 高質感的科技藍色
                        roughness: 1.0,  // 完全粗糙，呈現純霧面效果
                        metalness: 0.0,  // 無金屬感，徹底消除高光反射
                        side: THREE.DoubleSide // 內外雙面渲染
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    
                    processLoadedModel(mesh);
                }, undefined, function(error) {
                    console.error('STL 載入錯誤:', error);
                    alert('載入模型時發生錯誤。');
                    loadingIndicator.style.display = 'none';
                });
            } else {
                alert('不支援的檔案格式，請匯入 .glb, .gltf, .stl 或 .fbx 檔案。');
                loadingIndicator.style.display = 'none';
            }
        });

        // 5. 處理載入後的模型（自動置中與縮放）
        function processLoadedModel(object) {
            currentModel = object;
            
            // 【關鍵修正】解決 SketchUp (Z向上) 轉 Three.js (Y向上) 的躺平問題
            const zUpToggle = document.getElementById('zUpToggle');
            if (zUpToggle && zUpToggle.checked) {
                // 將模型沿著 X 軸向前翻轉 90 度 (扶正)
                currentModel.rotation.x = -Math.PI / 2;
                // 強制更新世界矩陣，確保後續的邊界框計算是基於扶正後的狀態
                currentModel.updateMatrixWorld(true);
            }

            // 【新增邊界渲染】為模型中的每個鋼板/實體加上邊界黑線，方便查看搭接處
            const edgeToggle = document.getElementById('edgeToggle');
            const showEdges = edgeToggle ? edgeToggle.checked : true;
            
            // 【新增】取得目前的 X-Ray 狀態
            const xrayToggle = document.getElementById('xrayToggle');
            const isXray = xrayToggle ? xrayToggle.checked : false;
            
            currentModel.traverse(function(child) {
                if (child.isMesh) {
                    // 【深度排序優化】確保輪廓線不會被平貼的面遮擋 (解決閃爍與隱藏問題)
                    if (child.material) {
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach(mat => {
                            // 儲存原始透明度設定，方便切換還原
                            mat.userData.originalTransparent = mat.transparent;
                            mat.userData.originalOpacity = mat.opacity;
                            
                            // 啟用多邊形偏移，把「光滑面」在視覺上往後退一點，讓「黑線」完全凸顯
                            mat.polygonOffset = true;
                            mat.polygonOffsetFactor = 1;
                            mat.polygonOffsetUnits = 1;

                            // 如果一載入就開啟了 X-Ray
                            if (isXray) {
                                mat.transparent = true;
                                mat.opacity = 0.4;
                                mat.depthWrite = false; // 讓內部結構不再互相遮擋
                            }
                        });
                    }

                    // 使用 EdgesGeometry 提取邊緣。15 代表只要相鄰面夾角大於 15 度就會畫線
                    const edges = new THREE.EdgesGeometry(child.geometry, 15);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
                        color: 0x000000, // 黑色線條
                        linewidth: 1 
                    }));
                    line.name = 'model_edges';
                    line.visible = showEdges; // 根據開關狀態決定是否顯示
                    child.add(line);
                }
            });

            scene.add(currentModel);

            // 計算模型的邊界框 (Bounding Box)
            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);

            // 【關鍵升級】將模型等比例縮放至合理大小，避免因尺寸過大超出攝影機範圍
            const targetSize = 10;
            const scale = targetSize / (maxDim || 1);
            currentModel.scale.set(scale, scale, scale);

            // 重新計算縮放後的邊界與中心
            const scaledBox = new THREE.Box3().setFromObject(currentModel);
            const center = scaledBox.getCenter(new THREE.Vector3());

            // 將模型移至場景中心
            currentModel.position.x -= center.x;
            currentModel.position.y -= center.y;
            currentModel.position.z -= center.z;

            // 根據新大小自動調整攝影機距離
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(targetSize / 2 / Math.tan(fov / 2));
            cameraZ *= 1.5; // 加上一點緩衝空間
            optimalCameraDistance = cameraZ; // 儲存此距離

            // 確保攝影機的遠截面 (far plane) 足夠深，並更新矩陣
            camera.far = cameraZ * 10;
            camera.updateProjectionMatrix();

            // 更新攝影機位置與控制器目標
            camera.position.set(0, targetSize / 2, cameraZ);
            controls.target.set(0, 0, 0);
            controls.update();

            // 隱藏載入中提示
            loadingIndicator.style.display = 'none';
            
            // 顯示視角切換按鈕
            document.getElementById('view-buttons').classList.remove('hidden');
        }

        // 6. 視窗大小改變時自動適應 (適應手機翻轉或尺寸變化)
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 【新增】監聽輪廓線開關事件，實現即時切換
        document.getElementById('edgeToggle').addEventListener('change', function(e) {
            if (currentModel) {
                currentModel.traverse(function(child) {
                    if (child.name === 'model_edges') {
                        child.visible = e.target.checked;
                    }
                });
            }
        });

        // 【新增】監聽 X-Ray 透視開關事件，實現即時切換
        document.getElementById('xrayToggle').addEventListener('change', function(e) {
            const isXray = e.target.checked;
            if (currentModel) {
                currentModel.traverse(function(child) {
                    if (child.isMesh && child.material) {
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach(mat => {
                            if (isXray) {
                                mat.transparent = true;
                                mat.opacity = 0.4; // 轉為半透明
                                mat.depthWrite = false; // 關閉深度寫入，讓隱藏在實體內部的鋼板穿透線完全顯現
                            } else {
                                // 恢復原本的材質設定
                                mat.transparent = mat.userData.originalTransparent || false;
                                mat.opacity = mat.userData.originalOpacity || 1.0;
                                mat.depthWrite = true;
                            }
                        });
                    }
                });
            }
        });

        // 7. 視角切換邏輯
        function setView(viewName) {
            if (!currentModel) return;
            const d = optimalCameraDistance;
            
            // 依據選擇的視角設定攝影機位置
            switch(viewName) {
                case 'front':  camera.position.set(0, 0, d); break;
                case 'back':   camera.position.set(0, 0, -d); break;
                case 'left':   camera.position.set(-d, 0, 0); break;
                case 'right':  camera.position.set(d, 0, 0); break;
                // 俯視與底視圖在 Z 軸增加極小偏移(0.001)，避免與 Up 向量平行導致畫面異常翻轉
                case 'top':    camera.position.set(0, d, 0.001); break;
                case 'bottom': camera.position.set(0, -d, 0.001); break;
            }
            // 確保目標點維持在模型中心，並更新控制器
            controls.target.set(0, 0, 0);
            controls.update();
        }

        // 8. 動畫迴圈 (持續渲染場景)
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 必須在 animate 中呼叫才能有阻尼效果
            renderer.render(scene, camera);
        }
        
        // 啟動動畫
        animate();
    </script>
</body>
</html>
