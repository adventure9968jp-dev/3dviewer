<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 【關鍵修復】加入 viewport-fit=cover 與縮放限制，徹底消除系統頂部的強制遮蔽/瀏海黑邊 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D 模型互動檢視器</title>
    <!-- 引入 Tailwind CSS 美化 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Three.js 核心與相關載入器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <!-- 新增 FBX 載入器及其解壓縮依賴庫 fflate -->
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <!-- 【新增】引入 CSS2DRenderer，用於渲染跟隨 3D 座標的 HTML 註解標籤 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <style>
        /* 【關鍵修復】將 height 改為 100%，避免 100vh 在行動裝置上因網址列造成的計算誤差與頂部黑塊 */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #1a1a1a; }
        /* 調整排版為上下分割，完美適應手機螢幕 */
        body { display: flex; flex-direction: column; }
        #canvas-container { flex: 1; position: relative; width: 100%; overflow: hidden; touch-action: none; }
        #ui-panel { flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        canvas { display: block; outline: none; }
        #loading { display: none; }
        
        /* 新增隱藏捲軸樣式，讓橫向滑動更美觀 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- Three.js 畫布容器 (上方：3D 模型專屬顯示區) -->
    <div id="canvas-container">
        <!-- 載入中提示改為顯示在上方畫布中央 -->
        <div id="loading" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-600 text-white px-6 py-3 rounded-xl shadow-2xl font-bold animate-pulse z-50">
            模型載入中...
        </div>
    </div>

    <!-- 用戶介面層 (下方：極致扁平化控制視窗) -->
    <div id="ui-panel" class="bg-gray-900 border-t border-gray-800 p-2 pb-[calc(0.5rem+env(safe-area-inset-bottom))] shadow-2xl w-full z-10 flex flex-col">
        
        <!-- 第一排：檔案匯入與功能開關 (可橫向滑動) -->
        <div class="flex items-center gap-3 overflow-x-auto hide-scrollbar w-full px-1">
            <label class="flex-shrink-0 cursor-pointer bg-blue-600 hover:bg-blue-500 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                匯入模型
                <!-- 【iOS 終極解法】完全移除 accept 屬性，強制讓 iPhone 允許點選任何檔案 -->
                <input type="file" id="fileInput" class="hidden" />
            </label>

            <!-- 【新增】註解模式開關按鈕 -->
            <button id="annotateToggle" class="flex-shrink-0 bg-gray-700 hover:bg-gray-600 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow border border-gray-600">
                📌 新增註解
            </button>

            <!-- 【新增】匯出與匯入註解紀錄按鈕 -->
            <button id="exportBtn" class="flex-shrink-0 bg-emerald-700 hover:bg-emerald-600 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow border border-emerald-600">
                💾 匯出紀錄
            </button>
            <label class="flex-shrink-0 cursor-pointer bg-emerald-700 hover:bg-emerald-600 text-white text-[13px] font-medium py-1.5 px-3 rounded-lg transition duration-300 shadow flex items-center border border-emerald-600">
                📂 匯入紀錄
                <!-- 【iOS 終極解法】完全移除 accept 屬性，強制讓 iPhone 允許點選任何檔案 -->
                <input type="file" id="importBtn" class="hidden" />
            </label>

            <!-- 開關區縮小並與匯入按鈕並排 -->
            <div class="flex gap-4 text-gray-300 text-[12px] flex-shrink-0 items-center border-l border-gray-700 pl-3">
                <!-- 【新增】亮色背景切換開關 -->
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="bgToggle" class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 🌗 亮色背景</label>
                <!-- 【新增】平行投影切換開關 -->
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="cameraToggle" class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 📐 平行投影</label>
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="edgeToggle" checked class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 🔲 輪廓線</label>
                <label class="flex items-center cursor-pointer hover:text-white whitespace-nowrap"><input type="checkbox" id="xrayToggle" class="mr-1 form-checkbox h-3.5 w-3.5 text-blue-500 rounded bg-gray-700 border-gray-600"> 👁️ X-Ray透視</label>
            </div>
        </div>

        <!-- 第二排：視角按鈕 (預設隱藏，橫向滑動) -->
        <div id="view-buttons" class="mt-2 flex gap-1.5 hidden w-full overflow-x-auto hide-scrollbar px-1">
            <button onclick="setView('top')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">俯視</button>
            <button onclick="setView('front')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">正視</button>
            <button onclick="setView('bottom')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">底視</button>
            <button onclick="setView('left')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">左側</button>
            <button onclick="setView('back')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">後視</button>
            <button onclick="setView('right')" class="flex-1 min-w-[50px] bg-gray-800 border border-gray-700 hover:bg-blue-500 text-white text-[12px] py-1.5 rounded transition">右側</button>
        </div>

        <!-- 第三排：操作提示 -->
        <div class="mt-1.5 text-center text-[11px] text-gray-500">
            👆 單指：旋轉視角 &nbsp;|&nbsp; ✌️ 雙指捏合：縮放 &nbsp;|&nbsp; ✌️ 雙指滑動：平移
        </div>
    </div>
